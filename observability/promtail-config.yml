# Promtail: lee el JSONL del portafolio y lo empuja a Loki.
# OJO con la cardinalidad: event y lang son labels (pocos valores);
# ip y cmd NUNCA como label — se consultan con `| json` en LogQL.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /positions/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: portfolio-terminal
    static_configs:
      - targets: [localhost]
        labels:
          job: portfolio-terminal
          host: pi-lab
          __path__: /var/log/portfolio/sessions.jsonl
    pipeline_stages:
      - json:
          expressions:
            event: event
            lang: lang
            ts: ts
      - labels:
          event:
          lang:
      - timestamp:
          source: ts
          format: RFC3339
