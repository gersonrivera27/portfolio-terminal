<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>Gerson Rivera — Portafolio</title>
<meta name="description" id="meta-desc" content="Portafolio de Gerson Hernandez Rivera, Cyber Security & Software Engineer. Una terminal real en una Raspberry Pi, enjaulada en Docker.">
<meta property="og:title" content="Gerson Rivera — Portfolio">
<meta property="og:description" content="Not a normal webpage: a real terminal running on my Raspberry Pi, sandboxed in Docker. / Una terminal real corriendo en mi Raspberry Pi.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230d1117'/%3E%3Ctext x='18' y='68' font-family='monospace' font-size='48' fill='%2358e6a8'%3E%26gt;_%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="vendor/xterm.min.css">
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1a2129;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58e6a8;
    --accent-dim: rgba(88, 230, 168, .35);
    --danger: #ff5f57;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(88, 230, 168, .07), transparent),
      var(--bg);
    color: var(--text);
    font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    min-height: 100vh;
  }
  /* Rejilla de fondo sutil, estilo blueprint */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background:
      linear-gradient(rgba(88, 230, 168, .025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88, 230, 168, .025) 1px, transparent 1px);
    background-size: 34px 34px;
    mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), transparent 70%);
    -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,.9), transparent 70%);
  }
  .container { max-width: 960px; margin: 0 auto; padding: 1.25rem 1.25rem 4rem; }

  /* ---- barra superior ---- */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 1rem; padding: .4rem 0;
  }
  .sys {
    color: var(--muted); font-size: .75rem; letter-spacing: .05em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sys .on { color: var(--accent); animation: pulse 2.2s ease-in-out infinite; }
  .lang-switch {
    display: flex; gap: .25rem; flex-shrink: 0;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: .25rem;
  }
  .lang-switch button {
    background: transparent; color: var(--muted);
    border: none; border-radius: 5px;
    font: inherit; font-size: .8rem; padding: .3rem .6rem;
    cursor: pointer; transition: color .15s, background .15s;
  }
  .lang-switch button:hover { color: var(--text); }
  .lang-switch button.active { background: #1f2630; color: var(--accent); }

  /* ---- header ---- */
  header { padding: 2.2rem 0 1.2rem; }
  .prompt-line { color: var(--muted); font-size: .9rem; margin-bottom: .5rem; }
  .prompt-line .dollar, .typed .dollar { color: var(--accent); }
  h1 {
    font-size: clamp(1.7rem, 5.5vw, 2.4rem); letter-spacing: -.02em;
    color: var(--accent);
    text-shadow: 0 0 22px var(--accent-dim);
  }
  h1 .cursor {
    display: inline-block; width: .55em; height: 1.05em;
    background: var(--accent); vertical-align: text-bottom;
    box-shadow: 0 0 10px var(--accent-dim);
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  @keyframes pulse { 50% { opacity: .45; } }
  .typed { margin-top: .5rem; color: var(--text); font-size: .95rem; min-height: 1.4em; }
  .typed .tcursor { color: var(--accent); animation: blink 1s steps(1) infinite; }
  .subtitle { color: var(--muted); margin-top: .8rem; line-height: 1.65; font-size: .92rem; max-width: 46rem; }
  .subtitle strong { color: var(--accent); font-weight: 600; }

  /* ---- badges de seguridad ---- */
  .badges { display: flex; flex-wrap: wrap; gap: .5rem; margin: 1.1rem 0 0; }
  .badge {
    display: inline-flex; align-items: center; gap: .4em;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--panel); color: var(--muted);
    font-size: .72rem; padding: .32em .8em; letter-spacing: .02em;
    white-space: nowrap;
  }
  .badge::before { content: '✓'; color: var(--accent); font-weight: 700; }

  /* ---- comandos listos ---- */
  .sec-label {
    color: var(--muted); font-size: .8rem; letter-spacing: .06em;
    margin: 1.6rem 0 .7rem;
  }
  .sec-label .hash { color: var(--accent); }
  .cmd-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: .6rem;
  }
  .cmd-btn {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: .65rem .8rem;
    font: inherit; text-align: left; cursor: pointer;
    transition: border-color .15s, background .15s, transform .15s, box-shadow .15s;
  }
  .cmd-btn:hover, .cmd-btn:focus-visible {
    border-color: var(--accent); background: var(--panel-2);
    transform: translateY(-2px);
    box-shadow: 0 4px 18px rgba(0, 0, 0, .35), 0 0 0 1px var(--accent-dim);
    outline: none;
  }
  .cmd-btn:active { transform: translateY(0); }
  .cmd-btn .c { display: block; color: var(--accent); font-weight: 600; font-size: .85rem; }
  .cmd-btn .c::before { content: '$ '; color: var(--muted); font-weight: 400; }
  .cmd-btn .d { display: block; color: var(--muted); font-size: .72rem; margin-top: .25rem; }
  .note { color: var(--muted); font-size: .78rem; margin: .7rem 0 1.2rem; line-height: 1.6; }

  /* ---- terminal ---- */
  .term-window {
    position: relative;
    border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; background: #0a0e14;
    box-shadow: 0 12px 40px rgba(0, 0, 0, .5), 0 0 60px rgba(88, 230, 168, .05);
  }
  /* scanlines sutiles tipo CRT */
  .term-window::after {
    content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(255, 255, 255, .014) 0 1px, transparent 1px 3px);
  }
  .term-bar {
    display: flex; align-items: center; gap: .5rem;
    background: var(--panel); padding: .6rem .9rem;
    border-bottom: 1px solid var(--border);
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .term-title {
    color: var(--muted); font-size: .8rem; margin-left: .5rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .term-timer { color: var(--muted); font-size: .8rem; margin-left: auto; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  #terminal { padding: .6rem; height: clamp(300px, 52vh, 440px); }

  .status-row {
    display: flex; align-items: center; flex-wrap: wrap; gap: .8rem;
    margin-top: .6rem; font-size: .8rem; color: var(--muted);
  }
  .status .ok { color: var(--accent); animation: pulse 2.2s ease-in-out infinite; }
  .status .err { color: var(--danger); }
  #reconnect {
    display: none;
    background: transparent; color: var(--accent);
    border: 1px solid var(--accent); border-radius: 6px;
    padding: .35rem .9rem; font: inherit; font-size: .8rem; cursor: pointer;
    transition: background .15s, box-shadow .15s;
  }
  #reconnect:hover { background: #1f2630; box-shadow: 0 0 14px var(--accent-dim); }

  footer { margin-top: 3rem; color: var(--muted); font-size: .85rem; line-height: 1.9; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ---- móvil ---- */
  @media (max-width: 600px) {
    .container { padding: .9rem .85rem 3rem; }
    header { padding: 1.4rem 0 .8rem; }
    .subtitle { font-size: .85rem; }
    .badges { gap: .4rem; }
    .badge { font-size: .68rem; }
    .cmd-grid { grid-template-columns: repeat(2, 1fr); gap: .5rem; }
    .cmd-btn { padding: .55rem .65rem; }
    .cmd-btn .c { font-size: .78rem; }
    #terminal { padding: .4rem; height: 46vh; }
    .term-title { font-size: .72rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    h1 .cursor, .typed .tcursor, .status .ok, .sys .on { animation: none; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <span class="sys">[ <span class="on">●</span> raspberry-pi :: docker-sandbox :: online ]</span>
    <div class="lang-switch" role="group" aria-label="Idioma / Language">
      <button data-lang="es">ES</button>
      <button data-lang="en">EN</button>
      <button data-lang="pt">PT</button>
    </div>
  </div>

  <header>
    <div class="prompt-line"><span class="dollar">$</span> whoami</div>
    <h1>Gerson Rivera<span class="cursor"></span></h1>
    <div class="typed"><span class="dollar">&gt;</span> <span id="typed-text"></span><span class="tcursor">█</span></div>
    <p class="subtitle" data-i18n="subtitle"></p>
    <div class="badges">
      <span class="badge" data-i18n="badge_sandbox"></span>
      <span class="badge" data-i18n="badge_nonet"></span>
      <span class="badge" data-i18n="badge_ro"></span>
      <span class="badge" data-i18n="badge_ttl"></span>
    </div>
  </header>

  <div class="sec-label"><span class="hash">##</span> <span data-i18n="cmd_title"></span></div>
  <div class="cmd-grid" id="cmds" role="group" aria-label="Comandos"></div>
  <p class="note" data-i18n="note"></p>

  <div class="term-window">
    <div class="term-bar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="term-title">visitante@raspberry-pi: ~</span>
      <span class="term-timer" id="timer"></span>
    </div>
    <div id="terminal"></div>
  </div>
  <div class="status-row">
    <span class="status" id="status"></span>
    <button id="reconnect"></button>
  </div>

  <noscript>
    <p style="margin-top:1.5rem; line-height:1.7;">
      Este portafolio necesita JavaScript para la terminal interactiva. /
      This portfolio needs JavaScript for the interactive terminal.
      — Gerson Hernandez Rivera, Cyber Security &amp; Software Engineer (Junior),
      Drogheda, Ireland (Dublin / Remote). Live honeypot + SOC lab (Cowrie,
      Grafana, Loki, MITRE ATT&amp;CK), full-stack platform in production,
      network segmentation &amp; forensics labs.
      Contact: gersonrivera02@icloud.com
    </p>
  </noscript>

  <footer>
    <div>📫 <span data-i18n="contact"></span>: <a href="mailto:gersonrivera02@icloud.com">gersonrivera02@icloud.com</a></div>
    <div>🔗 <a href="https://github.com/gersonrivera27" target="_blank" rel="noopener">GitHub</a> ·
      <a href="https://linkedin.com/in/gersonhernandezz" target="_blank" rel="noopener">LinkedIn</a></div>
    <div>⚙️ <span data-i18n="made_with"></span></div>
  </footer>
</div>

<script src="vendor/xterm.min.js"></script>
<script src="vendor/xterm-addon-fit.min.js"></script>
<script>
  // ---------- i18n ----------
  const I18N = {
    es: {
      title: 'Gerson Rivera — Portafolio',
      meta_desc: 'Portafolio de Gerson Hernandez Rivera, Cyber Security & Software Engineer. Una terminal real en una Raspberry Pi, enjaulada en Docker.',
      subtitle: 'Este portafolio <strong>no es una página normal</strong>: es una terminal real corriendo en mi <strong>Raspberry Pi</strong>. Cada visita levanta un contenedor Docker desechable, aislado y con límites — explóralo como si fuera mi computadora.',
      badge_sandbox: 'sandbox Docker efímero',
      badge_nonet: 'sin acceso a red',
      badge_ro: 'solo lectura',
      badge_ttl: 'autodestrucción en 10 min',
      cmd_title: 'comandos_listos — toca uno para ejecutarlo',
      d_ls: 'listar archivos',
      d_about: 'quién soy',
      d_projects: 'entrar a mis proyectos',
      d_tree: 'ver toda la estructura',
      d_skills: 'skills y stack',
      d_contact: 'cómo contactarme',
      note: 'También puedes escribir directamente en la terminal (bash real). La sesión dura 10 minutos. Rompe lo que quieras: el sandbox se autodestruye. 😉',
      status_connecting: 'Conectando…',
      status_connected: '<span class="ok">● Conectado</span> — sesión aislada iniciada',
      status_disconnected: '<span class="err">● Desconectado</span>',
      status_error: '<span class="err">● Error de conexión</span>',
      reconnect: '↻ Nueva sesión',
      contact: 'Contacto',
      made_with: 'Hecho con una Raspberry Pi, Docker, Node.js, xterm.js y Cloudflare Tunnel.',
    },
    en: {
      title: 'Gerson Rivera — Portfolio',
      meta_desc: 'Portfolio of Gerson Hernandez Rivera, Cyber Security & Software Engineer. A real terminal on a Raspberry Pi, sandboxed in Docker.',
      subtitle: 'This portfolio is <strong>not a normal webpage</strong>: it is a real terminal running on my <strong>Raspberry Pi</strong>. Every visit spins up a disposable, isolated Docker container with hard limits — explore it as if it were my computer.',
      badge_sandbox: 'ephemeral Docker sandbox',
      badge_nonet: 'no network access',
      badge_ro: 'read-only filesystem',
      badge_ttl: 'self-destructs in 10 min',
      cmd_title: 'ready_to_run — tap one to execute it',
      d_ls: 'list files',
      d_about: 'who I am',
      d_projects: 'browse my projects',
      d_tree: 'see the whole structure',
      d_skills: 'skills & stack',
      d_contact: 'how to reach me',
      note: 'You can also type directly in the terminal (real bash). Sessions last 10 minutes. Break whatever you want: the sandbox self-destructs. 😉',
      status_connecting: 'Connecting…',
      status_connected: '<span class="ok">● Connected</span> — isolated session started',
      status_disconnected: '<span class="err">● Disconnected</span>',
      status_error: '<span class="err">● Connection error</span>',
      reconnect: '↻ New session',
      contact: 'Contact',
      made_with: 'Built with a Raspberry Pi, Docker, Node.js, xterm.js and Cloudflare Tunnel.',
    },
    pt: {
      title: 'Gerson Rivera — Portfólio',
      meta_desc: 'Portfólio de Gerson Hernandez Rivera, Cyber Security & Software Engineer. Um terminal real em um Raspberry Pi, isolado em Docker.',
      subtitle: 'Este portfólio <strong>não é uma página normal</strong>: é um terminal real rodando no meu <strong>Raspberry Pi</strong>. Cada visita cria um contêiner Docker descartável, isolado e com limites — explore como se fosse o meu computador.',
      badge_sandbox: 'sandbox Docker efêmero',
      badge_nonet: 'sem acesso à rede',
      badge_ro: 'somente leitura',
      badge_ttl: 'autodestruição em 10 min',
      cmd_title: 'comandos_prontos — toque em um para executar',
      d_ls: 'listar arquivos',
      d_about: 'quem eu sou',
      d_projects: 'entrar nos meus projetos',
      d_tree: 'ver toda a estrutura',
      d_skills: 'skills e stack',
      d_contact: 'como falar comigo',
      note: 'Você também pode digitar direto no terminal (bash real). A sessão dura 10 minutos. Quebre o que quiser: o sandbox se autodestrói. 😉',
      status_connecting: 'Conectando…',
      status_connected: '<span class="ok">● Conectado</span> — sessão isolada iniciada',
      status_disconnected: '<span class="err">● Desconectado</span>',
      status_error: '<span class="err">● Erro de conexão</span>',
      reconnect: '↻ Nova sessão',
      contact: 'Contato',
      made_with: 'Feito com um Raspberry Pi, Docker, Node.js, xterm.js e Cloudflare Tunnel.',
    },
  };

  // Comandos listos para usar. En EN/PT la sesión arranca en ~/english,
  // así que los comandos apuntan a los archivos traducidos.
  const COMMANDS = {
    es: [
      { cmd: 'ls', k: 'd_ls' },
      { cmd: 'cat sobre-mi.txt', k: 'd_about' },
      { cmd: 'cd proyectos', k: 'd_projects' },
      { cmd: 'tree', k: 'd_tree' },
      { cmd: 'cat habilidades.txt', k: 'd_skills' },
      { cmd: 'cat contacto.txt', k: 'd_contact' },
    ],
    en: [
      { cmd: 'ls', k: 'd_ls' },
      { cmd: 'cat about-me.txt', k: 'd_about' },
      { cmd: 'cd projects', k: 'd_projects' },
      { cmd: 'tree', k: 'd_tree' },
      { cmd: 'cat skills.txt', k: 'd_skills' },
      { cmd: 'cat contact.txt', k: 'd_contact' },
    ],
  };
  COMMANDS.pt = COMMANDS.en;

  const statusEl = document.getElementById('status');
  const timerEl = document.getElementById('timer');
  const reconnectBtn = document.getElementById('reconnect');
  const cmdsEl = document.getElementById('cmds');

  let lang = localStorage.getItem('lang');
  if (!lang || !I18N[lang]) {
    const nav = (navigator.language || 'es').slice(0, 2).toLowerCase();
    lang = I18N[nav] ? nav : 'es';
  }
  let lastStatus = 'connecting';

  function t(key) { return I18N[lang][key]; }

  function setStatus(key) {
    lastStatus = key;
    statusEl.innerHTML = t('status_' + key);
  }

  function renderCmds() {
    cmdsEl.innerHTML = '';
    COMMANDS[lang].forEach(({ cmd, k }) => {
      const btn = document.createElement('button');
      btn.className = 'cmd-btn';
      btn.type = 'button';
      const c = document.createElement('span');
      c.className = 'c';
      c.textContent = cmd;
      const d = document.createElement('span');
      d.className = 'd';
      d.textContent = t(k);
      btn.append(c, d);
      btn.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(cmd + '\r');
          term.focus();
          document.querySelector('.term-window').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });
      cmdsEl.appendChild(btn);
    });
  }

  function setLang(l) {
    lang = l;
    localStorage.setItem('lang', l);
    document.documentElement.lang = l;
    document.title = t('title');
    document.getElementById('meta-desc').setAttribute('content', t('meta_desc'));
    document.querySelectorAll('[data-i18n]').forEach((el) => {
      el.innerHTML = t(el.dataset.i18n);
    });
    renderCmds();
    reconnectBtn.textContent = t('reconnect');
    setStatus(lastStatus);
    document.querySelectorAll('.lang-switch button').forEach((b) => {
      b.classList.toggle('active', b.dataset.lang === l);
    });
  }

  document.querySelectorAll('.lang-switch button').forEach((b) => {
    b.addEventListener('click', () => setLang(b.dataset.lang));
  });

  // ---------- efecto de tipeo del rol ----------
  const ROLE = 'Cyber Security & Software Engineer — Drogheda, IE';
  const typedEl = document.getElementById('typed-text');
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    typedEl.textContent = ROLE;
  } else {
    let ti = 0;
    (function type() {
      typedEl.textContent = ROLE.slice(0, ti++);
      if (ti <= ROLE.length) setTimeout(type, 35 + Math.random() * 45);
    })();
  }

  // ---------- Terminal ----------
  const SESSION_MS = 10 * 60 * 1000;
  const isSmall = window.matchMedia('(max-width: 600px)').matches;
  const term = new Terminal({
    cursorBlink: true,
    fontSize: isSmall ? 13 : 14,
    fontFamily: '"SF Mono", "Fira Code", Menlo, Consolas, monospace',
    theme: {
      background: '#0a0e14',
      foreground: '#e6edf3',
      cursor: '#58e6a8',
      selectionBackground: '#2d4f3f',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  let ws = null;
  let timerInterval = null;

  function startTimer() {
    const end = Date.now() + SESSION_MS;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const left = Math.max(0, end - Date.now());
      const m = Math.floor(left / 60000);
      const s = Math.floor((left % 60000) / 1000);
      timerEl.textContent = `⏱ ${m}:${String(s).padStart(2, '0')}`;
      if (left <= 0) clearInterval(timerInterval);
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerEl.textContent = '';
  }

  function sendResize() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    }
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    // El idioma elegido viaja al servidor, que se lo pasa al contenedor
    ws = new WebSocket(`${proto}://${location.host}/terminal?lang=${lang}`);

    ws.onopen = () => {
      setStatus('connected');
      reconnectBtn.style.display = 'none';
      startTimer();
      sendResize();
      if (!isSmall) term.focus(); // en móvil no abrir el teclado de golpe
    };
    ws.onmessage = (e) => term.write(e.data);
    ws.onclose = () => {
      setStatus('disconnected');
      reconnectBtn.style.display = 'inline-block';
      stopTimer();
    };
    ws.onerror = () => {
      setStatus('error');
      reconnectBtn.style.display = 'inline-block';
      stopTimer();
    };
  }

  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
  });

  reconnectBtn.addEventListener('click', () => {
    term.reset();
    setStatus('connecting');
    connect();
  });

  let resizeRaf = null;
  window.addEventListener('resize', () => {
    cancelAnimationFrame(resizeRaf);
    resizeRaf = requestAnimationFrame(() => {
      fitAddon.fit();
      sendResize();
    });
  });

  setLang(lang);
  setStatus('connecting');
  connect();
</script>
</body>
</html>
