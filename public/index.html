<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e12">
<title>Gerson Rivera — Portafolio</title>
<meta name="description" id="meta-desc" content="Portafolio de Gerson Hernandez Rivera, Cyber Security & Software Engineer. Una terminal real en una Raspberry Pi, enjaulada en Docker.">
<meta property="og:title" content="Gerson Rivera — Portfolio">
<meta property="og:description" content="Not a normal webpage: a real terminal running on my Raspberry Pi, sandboxed in Docker. / Una terminal real corriendo en mi Raspberry Pi.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230a0e12'/%3E%3Ctext x='18' y='68' font-family='monospace' font-size='48' fill='%2300e5ff'%3E%26gt;_%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="vendor/xterm.min.css">
<style>
  @font-face {
    font-family: 'Press Start 2P';
    src: url('vendor/press-start-2p.woff2') format('woff2');
    font-display: swap;
  }

  :root {
    --bg: #0a0e12;
    --panel: #0d1319;
    --panel-2: #10161c;
    --border: #1d252e;
    --metal-hi: #39424c;
    --text: #d7e6ee;
    --muted: #7b8b96;
    --muted-light: #a9b7c0; /* descripciones secundarias: mismo tinte, +contraste (~8:1 sobre --panel) */
    --neon: #00e5ff;
    --neon-dim: rgba(0, 229, 255, .35);
    --neon-faint: rgba(0, 229, 255, .12);
    --led: #3aff6e;
    --led-dim: rgba(58, 255, 110, .4);
    --warn: #ffc857;
    --err: #ff4b4b;
    --term-green: #45f376;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Mono", "Fira Code", Menlo, Consolas, monospace;
    min-height: 100vh;
  }
  /* ---- fondo: rejilla PCB con vías ---- */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background-image:
      radial-gradient(circle at 30% -5%, rgba(0, 229, 255, .06), transparent 45%),
      radial-gradient(rgba(0, 229, 255, .07) 1px, transparent 1.6px),
      repeating-linear-gradient(0deg, rgba(0, 229, 255, .028) 0 1px, transparent 1px 28px),
      repeating-linear-gradient(90deg, rgba(0, 229, 255, .028) 0 1px, transparent 1px 28px);
    background-size: auto, 28px 28px, auto, auto;
  }
  .container { max-width: 1080px; margin: 0 auto; padding: 1.4rem 1.2rem 4rem; display: grid; gap: 1.2rem; }

  /* ============ módulos con bisel metálico ============ */
  .module {
    position: relative;
    border-radius: 16px;
    padding: 13px;
    border: 1px solid var(--metal-hi);
    background:
      linear-gradient(160deg, rgba(255, 255, 255, .09), rgba(0, 0, 0, .38) 55%),
      repeating-linear-gradient(90deg, #262d34 0px, #2c333b 1px, #262d34 2px);
    box-shadow:
      0 14px 34px rgba(0, 0, 0, .6),
      inset 0 1px 0 rgba(255, 255, 255, .14),
      0 0 26px var(--neon-faint);
  }
  /* bisel de fibra de carbono (módulo principal) */
  .module.carbon {
    background-color: #14181c;
    background-image:
      linear-gradient(160deg, rgba(255, 255, 255, .06), rgba(0, 0, 0, .45) 60%),
      linear-gradient(45deg, rgba(255, 255, 255, .05) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, .05) 75%),
      linear-gradient(45deg, rgba(255, 255, 255, .05) 25%, transparent 25%, transparent 75%, rgba(255, 255, 255, .05) 75%);
    background-position: 0 0, 0 0, 4px 4px;
    background-size: auto, 8px 8px, 8px 8px;
  }
  .inner {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: inset 0 3px 14px rgba(0, 0, 0, .7), inset 0 0 0 1px rgba(0, 229, 255, .04);
    padding: 1.1rem 1.2rem;
  }

  /* ---- tornillos ---- */
  .screw {
    position: absolute; width: 13px; height: 13px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #cfd6dc, #6a7480 45%, #2c343c 85%);
    box-shadow: inset 0 -1px 2px rgba(0, 0, 0, .7), 0 1px 2px rgba(0, 0, 0, .6);
  }
  .screw::after {
    content: ''; position: absolute; left: 2px; right: 2px; top: 5.5px; height: 1.6px;
    background: rgba(20, 26, 32, .85); border-radius: 1px; transform: rotate(38deg);
  }
  .screw.tl { top: 6px; left: 6px; }
  .screw.tr { top: 6px; right: 6px; transform: rotate(72deg); }
  .screw.bl { bottom: 6px; left: 6px; transform: rotate(140deg); }
  .screw.br { bottom: 6px; right: 6px; transform: rotate(23deg); }

  /* ============ encabezado ============ */
  .hdr .inner { display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  h1 {
    font-family: 'Press Start 2P', "SF Mono", monospace;
    font-size: clamp(1rem, 3.4vw, 1.7rem);
    color: var(--neon);
    letter-spacing: .05em;
    text-shadow: 0 0 6px var(--neon-dim), 0 0 26px var(--neon-dim);
  }
  .role { color: var(--muted); font-size: .72rem; letter-spacing: .28em; margin-top: .55rem; }
  .subtitle { color: var(--muted); font-size: .8rem; line-height: 1.6; margin-top: .7rem; max-width: 46rem; }
  .subtitle strong { color: var(--neon); font-weight: 600; }

  /* chips de idioma estilo circuito integrado */
  .lang-switch { display: flex; gap: .55rem; }
  .lang-switch button {
    position: relative;
    font: inherit; font-size: .74rem; letter-spacing: .08em;
    color: var(--muted); cursor: pointer;
    padding: .5rem .8rem;
    background: linear-gradient(180deg, #1c232a, #12181e);
    border: 1px solid #2b343d; border-radius: 4px;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, .65), 0 1px 0 rgba(255, 255, 255, .06);
    transition: color .15s, box-shadow .15s, border-color .15s;
  }
  /* patitas del chip */
  .lang-switch button::before, .lang-switch button::after {
    content: ''; position: absolute; left: 6px; right: 6px; height: 3px;
    background: repeating-linear-gradient(90deg, #55606a 0 3px, transparent 3px 7px);
  }
  .lang-switch button::before { top: -4px; }
  .lang-switch button::after { bottom: -4px; }
  .lang-switch button:hover { color: var(--text); }
  .lang-switch button.active {
    color: var(--neon); border-color: var(--neon);
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, .65), 0 0 12px var(--neon-dim);
    text-shadow: 0 0 8px var(--neon-dim);
  }

  /* ============ panel de estado ============ */
  .status-panel .inner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 1.2rem; flex-wrap: wrap;
    background:
      radial-gradient(rgba(58, 255, 110, .06) 1px, transparent 1.5px),
      repeating-linear-gradient(0deg, rgba(58, 255, 110, .045) 0 1px, transparent 1px 14px),
      repeating-linear-gradient(90deg, rgba(58, 255, 110, .045) 0 1px, transparent 1px 14px),
      #0b1710;
    background-size: 14px 14px, auto, auto, auto;
  }
  .led-block { display: flex; align-items: center; gap: .6rem; font-size: .78rem; color: var(--muted); }
  .led {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--led); box-shadow: 0 0 8px var(--led-dim), 0 0 2px var(--led);
    animation: ledblink 2.4s ease-in-out infinite;
  }
  .led.warn { background: var(--warn); box-shadow: 0 0 8px rgba(255, 200, 87, .5); animation: none; }
  .led.err { background: var(--err); box-shadow: 0 0 8px rgba(255, 75, 75, .5); animation: none; }
  @keyframes ledblink { 50% { opacity: .55; } }
  .status { font-size: .78rem; }
  .status .ok { color: var(--led); }
  .status .err { color: var(--err); }

  .gauges { display: flex; gap: 1.4rem; }
  .gauge { display: flex; flex-direction: column; align-items: center; gap: .15rem; }
  .gauge svg { transform: rotate(-90deg); }
  .gauge .track { stroke: #102b31; }
  .gauge .val {
    stroke: var(--neon); stroke-linecap: round;
    filter: drop-shadow(0 0 4px var(--neon-dim));
    transition: stroke-dashoffset .8s ease;
  }
  .gauge .pct {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: .68rem; color: var(--neon); text-shadow: 0 0 6px var(--neon-dim);
  }
  .gauge .ring { position: relative; width: 58px; height: 58px; }
  .gauge label { font-size: .6rem; letter-spacing: .2em; color: var(--muted); }

  .clock { display: flex; align-items: center; gap: .45rem; font-size: .95rem; color: var(--led); text-shadow: 0 0 8px var(--led-dim); font-variant-numeric: tabular-nums; }
  .clock .ico svg { width: 15px; height: 15px; display: block; }

  .rec { display: flex; align-items: center; gap: .45rem; font-size: .66rem; letter-spacing: .12em; color: var(--muted); }
  .rec-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--err); box-shadow: 0 0 8px rgba(255, 75, 75, .6);
    animation: recblink 1.6s ease-in-out infinite;
  }
  @keyframes recblink { 50% { opacity: .35; } }

  /* ============ consola principal ============ */
  .console-grid { display: grid; grid-template-columns: 300px 1fr; gap: 1.1rem; }
  .sec-label { color: var(--muted); font-size: .78rem; letter-spacing: .06em; margin-bottom: .7rem; }
  .sec-label .hash { color: var(--neon); }

  .cmd-grid { display: grid; gap: .55rem; }
  .cmd-btn {
    display: flex; align-items: flex-start; gap: .55rem;
    font: inherit; text-align: left; cursor: pointer;
    padding: .6rem .7rem; border-radius: 9px;
    color: var(--text);
    background: linear-gradient(150deg, rgba(28, 36, 44, .9), rgba(12, 17, 22, .95));
    border: 1px solid #232c35;
    box-shadow:
      4px 4px 10px rgba(0, 0, 0, .55),
      -2px -2px 6px rgba(255, 255, 255, .035),
      inset 0 1px 0 rgba(255, 255, 255, .05);
    transition: border-color .15s, box-shadow .15s, transform .1s;
  }
  .cmd-btn:hover, .cmd-btn:focus-visible {
    outline: none; border-color: var(--neon);
    box-shadow: 4px 4px 12px rgba(0, 0, 0, .55), 0 0 16px var(--neon-dim), inset 0 1px 0 rgba(255, 255, 255, .06);
  }
  .cmd-btn:hover .c { text-shadow: 0 0 9px var(--neon-dim); }
  .cmd-btn:active {
    transform: translateY(1px);
    box-shadow: inset 3px 3px 8px rgba(0, 0, 0, .7);
  }
  .cmd-btn .ico { color: var(--neon); opacity: .8; margin-top: .1rem; }
  .cmd-btn .ico svg { width: 15px; height: 15px; display: block; }
  .cmd-btn:hover .ico { opacity: 1; filter: drop-shadow(0 0 4px var(--neon-dim)); }
  .cmd-btn .c { display: block; color: var(--neon); font-weight: 600; font-size: .8rem; transition: text-shadow .15s; }
  .cmd-btn .c::before { content: '$ '; color: var(--muted); font-weight: 400; }
  .cmd-btn .d { display: block; color: var(--muted-light); font-size: .68rem; margin-top: .2rem; }
  .note { color: var(--muted); font-size: .74rem; margin-top: .8rem; line-height: 1.6; }

  .term-side { display: flex; flex-direction: column; min-width: 0; }
  .term-window {
    position: relative; flex: 1;
    border: 1px solid #060a08; border-radius: 8px;
    overflow: hidden; background: #050807;
    box-shadow: inset 0 0 24px rgba(0, 0, 0, .9), 0 0 18px rgba(69, 243, 118, .05);
  }
  .term-window::after {
    content: ''; position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(255, 255, 255, .015) 0 1px, transparent 1px 3px);
  }
  .term-bar {
    display: flex; align-items: center; gap: .5rem;
    background: linear-gradient(180deg, #151b21, #0e1318);
    padding: .5rem .8rem; border-bottom: 1px solid #060a08;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 -1px 2px rgba(0,0,0,.5); }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .term-title {
    color: var(--term-green); font-size: .74rem; margin-left: .4rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-shadow: 0 0 5px rgba(69, 243, 118, .5);
  }
  #terminal { padding: .5rem; height: clamp(300px, 48vh, 430px); }
  /* Glow CRT: este build usa el DOM renderer de xterm.js (spans reales, no
     canvas), así que text-shadow actúa directo sobre los glyphs — fósforo
     verde sutil, sin perder nitidez. Si algún día se activa el addon Canvas
     o WebGL, cambiar a filter: drop-shadow(...) sobre el <canvas>. */
  #terminal .xterm-rows {
    text-shadow: 0 0 5px rgba(69, 243, 118, .5);
  }
  .status-row { display: flex; align-items: center; flex-wrap: wrap; gap: .8rem; margin-top: .6rem; font-size: .76rem; color: var(--muted); }
  #reconnect {
    display: none; font: inherit; font-size: .76rem; cursor: pointer;
    color: var(--neon); background: transparent;
    border: 1px solid var(--neon); border-radius: 6px; padding: .32rem .85rem;
    transition: box-shadow .15s, background .15s;
  }
  #reconnect:hover { background: rgba(0, 229, 255, .08); box-shadow: 0 0 14px var(--neon-dim); }

  /* ============ guestbook ============ */
  .gbook { display: grid; gap: .55rem; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
  .gb-item {
    display: flex; gap: .65rem; align-items: flex-start;
    background: linear-gradient(150deg, rgba(24, 31, 38, .9), rgba(12, 17, 22, .95));
    border: 1px solid #232c35; border-left: 3px solid var(--neon);
    border-radius: 9px; padding: .6rem .75rem;
    box-shadow: 3px 3px 9px rgba(0, 0, 0, .5), inset 0 1px 0 rgba(255, 255, 255, .04);
  }
  .gb-avatar { flex-shrink: 0; border-radius: 4px; image-rendering: pixelated; box-shadow: 0 0 8px var(--neon-faint); }
  .gb-msg { color: var(--text); font-size: .8rem; line-height: 1.5; overflow-wrap: anywhere; }
  .gb-date { display: block; color: var(--muted); font-size: .65rem; margin-top: .3rem; }
  .gb-empty { color: var(--muted); font-size: .8rem; }

  .gb-compose { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; }
  #gb-input {
    flex: 1; font: inherit; font-size: .82rem; color: var(--text);
    background: #0a0f14; border: 1px solid #232c35; border-radius: 8px;
    padding: .7rem .85rem;
    box-shadow: inset 0 3px 9px rgba(0, 0, 0, .65);
  }
  #gb-input:focus { outline: none; border-color: var(--neon); box-shadow: inset 0 3px 9px rgba(0, 0, 0, .65), 0 0 12px var(--neon-faint); }
  #gb-input.shake { animation: shake .3s; border-color: var(--err); }
  @keyframes shake { 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

  /* interruptor de palanca industrial */
  .toggle { position: relative; display: inline-block; width: 46px; height: 74px; flex-shrink: 0; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .lever {
    position: absolute; inset: 0; border-radius: 10px;
    background: linear-gradient(160deg, #303a44, #171d23);
    border: 1px solid var(--metal-hi);
    box-shadow: inset 0 3px 10px rgba(0, 0, 0, .8), 0 3px 8px rgba(0, 0, 0, .5);
  }
  .lever::before { /* perno */
    content: ''; position: absolute; left: 50%; top: 50%;
    width: 26px; height: 26px; margin: -13px 0 0 -13px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #d9e0e6, #77828d 50%, #333c45 90%);
    box-shadow: 0 4px 8px rgba(0, 0, 0, .7);
    transition: transform .18s cubic-bezier(.6, 1.6, .6, 1);
    transform: translateY(14px);
  }
  .lever::after { /* palanca */
    content: ''; position: absolute; left: 50%; top: 50%;
    width: 9px; height: 30px; margin-left: -4.5px; border-radius: 5px;
    background: linear-gradient(180deg, #aab5bf, #59636d);
    box-shadow: 0 2px 6px rgba(0, 0, 0, .7);
    transition: transform .18s cubic-bezier(.6, 1.6, .6, 1);
    transform: translateY(2px);
    transform-origin: 50% 100%;
  }
  .toggle input:checked + .lever {
    box-shadow: inset 0 3px 10px rgba(0, 0, 0, .8), 0 0 18px var(--led-dim), 0 3px 8px rgba(0, 0, 0, .5);
    border-color: var(--led);
  }
  .toggle input:checked + .lever::before { transform: translateY(-14px); background: radial-gradient(circle at 35% 30%, #d4ffe2, #3aff6e 55%, #14733a 95%); }
  .toggle input:checked + .lever::after { transform: translateY(-26px); }
  .toggle-label { font-size: .62rem; letter-spacing: .15em; color: var(--muted); text-align: center; display: block; margin-top: .3rem; }

  footer { color: var(--muted); font-size: .8rem; line-height: 1.9; padding: 0 .4rem; }
  .ficon { display: inline-block; vertical-align: -2px; margin-right: .45rem; color: var(--neon); opacity: .75; }
  .ficon svg { width: 14px; height: 14px; display: block; }
  footer a { color: var(--neon); text-decoration: none; }
  footer a:hover { text-decoration: underline; text-shadow: 0 0 8px var(--neon-dim); }

  /* ---- responsive ---- */
  @media (max-width: 760px) {
    .console-grid { grid-template-columns: 1fr; }
    .cmd-grid { grid-template-columns: repeat(2, 1fr); }
    #terminal { height: 44vh; }
    .gauges { gap: .9rem; }
    .status-panel .inner { justify-content: center; }
  }
  .log-note { display: flex; gap: .1rem; align-items: baseline; }
  .log-note .ficon { flex-shrink: 0; }

  @media (prefers-reduced-motion: reduce) {
    .led, .rec-dot { animation: none; }
    .gauge .val { transition: none; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- ===== encabezado ===== -->
  <header class="module hdr">
    <span class="screw tl"></span><span class="screw tr"></span><span class="screw bl"></span><span class="screw br"></span>
    <div class="inner">
      <div>
        <h1>GERSON RIVERA</h1>
        <div class="role">CYBER SECURITY &amp; SOFTWARE ENGINEER</div>
        <p class="subtitle" data-i18n="subtitle"></p>
      </div>
      <div class="lang-switch" role="group" aria-label="Idioma / Language">
        <button data-lang="es">ES</button>
        <button data-lang="en">EN</button>
        <button data-lang="pt">PT</button>
      </div>
    </div>
  </header>

  <!-- ===== panel de estado ===== -->
  <section class="module status-panel">
    <span class="screw tl"></span><span class="screw tr"></span><span class="screw bl"></span><span class="screw br"></span>
    <div class="inner">
      <div class="led-block">
        <span class="led" id="led"></span>
        <span class="status" id="status"></span>
      </div>
      <div class="gauges">
        <div class="gauge">
          <div class="ring">
            <svg width="58" height="58" viewBox="0 0 58 58">
              <circle class="track" cx="29" cy="29" r="24" fill="none" stroke-width="5"/>
              <circle class="val" id="g-cpu" cx="29" cy="29" r="24" fill="none" stroke-width="5"
                stroke-dasharray="150.8" stroke-dashoffset="150.8"/>
            </svg>
            <span class="pct" id="g-cpu-t">0%</span>
          </div>
          <label>CPU</label>
        </div>
        <div class="gauge">
          <div class="ring">
            <svg width="58" height="58" viewBox="0 0 58 58">
              <circle class="track" cx="29" cy="29" r="24" fill="none" stroke-width="5"/>
              <circle class="val" id="g-ram" cx="29" cy="29" r="24" fill="none" stroke-width="5"
                stroke-dasharray="150.8" stroke-dashoffset="150.8"/>
            </svg>
            <span class="pct" id="g-ram-t">0%</span>
          </div>
          <label>RAM</label>
        </div>
      </div>
      <div class="rec"><span class="rec-dot"></span><span data-i18n="rec_label"></span></div>
      <div class="clock"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span><span id="timer">--:--</span></div>
    </div>
  </section>

  <!-- ===== consola principal ===== -->
  <section class="module carbon">
    <span class="screw tl"></span><span class="screw tr"></span><span class="screw bl"></span><span class="screw br"></span>
    <div class="inner">
      <div class="console-grid">
        <div class="cmd-panel">
          <div class="sec-label"><span class="hash">##</span> <span data-i18n="cmd_title"></span></div>
          <div class="cmd-grid" id="cmds" role="group" aria-label="Comandos"></div>
          <p class="note" data-i18n="note"></p>
        </div>
        <div class="term-side">
          <div class="term-window">
            <div class="term-bar">
              <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
              <span class="term-title">visitante@raspberry-pi: ~</span>
            </div>
            <div id="terminal"></div>
          </div>
          <div class="status-row">
            <span id="status2"></span>
            <button id="reconnect"></button>
          </div>
          <p class="note log-note">
            <span class="ficon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span><span data-i18n="log_note"></span>
          </p>
        </div>
      </div>
    </div>
  </section>

      const d = document.createElement('span');
      d.className = 'd';

      body.append(c, d);
      btn.append(icon, body);
      btn.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN) {

          document.querySelector('.term-window').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      cmdsEl.appendChild(btn);

  function setLang(l) {
    lang = l;

    document.documentElement.lang = l;

    renderGbook();
    reconnectBtn.textContent = t('reconnect');
    setStatus(lastStatus);
    document.querySelectorAll('.lang-switch button').forEach((b) => {
      b.classList.toggle('active', b.dataset.lang === l);

  // ---------- medidores CPU/RAM (decorativos: especificaciones del sandbox) ----------
  const CIRC = 150.8;
  function setGauge(id, pct) {
    document.getElementById(id).style.strokeDashoffset = CIRC * (1 - pct / 100);
    document.getElementById(id + '-t').textContent = Math.round(pct) + '%';
  }
  let cpuV = 18, ramV = 34;
  function tickGauges() {
    cpuV = Math.min(88, Math.max(6, cpuV + (Math.random() - 0.5) * 14));
    ramV = Math.min(80, Math.max(22, ramV + (Math.random() - 0.5) * 8));
    setGauge('g-cpu', cpuV);
    setGauge('g-ram', ramV);
  }
  tickGauges();

  // ---------- guestbook ----------
  let gbData = null;

  // avatar pixel-art determinista (5x5 espejado) a partir del mensaje
  function identicon(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
    const hue = 150 + (h % 70); // gama cian/verde
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', '34'); svg.setAttribute('height', '34');
    svg.setAttribute('viewBox', '0 0 5 5'); svg.classList.add('gb-avatar');
    let bits = h;
    for (let x = 0; x < 3; x++) {
      for (let y = 0; y < 5; y++) {
        bits = (bits * 1103515245 + 12345) >>> 0;
        if (bits % 3 !== 0) continue;
        for (const px of x === 2 ? [2] : [x, 4 - x]) {
          const r = document.createElementNS(svgNS, 'rect');
          r.setAttribute('x', px); r.setAttribute('y', y);
          r.setAttribute('width', 1); r.setAttribute('height', 1);
          r.setAttribute('fill', `hsl(${hue} 90% ${45 + (bits % 20)}%)`);
          svg.appendChild(r);
        }
      }
    }
    return svg;
  }

  function renderGbook() {
    const el = document.getElementById('gbook');
    el.innerHTML = '';
    if (!gbData || !gbData.length) {
      const p = document.createElement('div');
      p.className = 'gb-empty';
      p.textContent = t('gb_empty');
      el.appendChild(p);
      return;
    }
    gbData.forEach((e) => {
      const item = document.createElement('div');
      item.className = 'gb-item';
      const body = document.createElement('div');
      const msg = document.createElement('span');
      msg.className = 'gb-msg';
      // textContent SIEMPRE: contenido de usuarios anónimos, nunca innerHTML
      msg.textContent = '“' + e.msg + '”';
      const date = document.createElement('span');
      date.className = 'gb-date';
      date.textContent = (e.ts || '').slice(0, 10);
      body.append(msg, date);
      item.append(identicon(e.msg + (e.ts || '')), body);
      el.appendChild(item);
    });
  }
  function loadGbook() {
    fetch('/api/guestbook')
      .then((r) => (r.ok ? r.json() : []))
      .then((d) => { gbData = d; renderGbook(); })
      .catch(() => renderGbook());
  }
  setInterval(loadGbook, 60000);
  loadGbook();

  // palanca: envía la firma por la MISMA vía que la terminal (ws -> servidor)
  const gbInput = document.getElementById('gb-input');
  const gbToggle = document.getElementById('gb-toggle');
  gbToggle.addEventListener('change', () => {
    if (!gbToggle.checked) return;
    const msg = gbInput.value.trim();
    if (msg && ws && ws.readyState === WebSocket.OPEN) {
      ws.send((lang === 'es' ? 'firmar ' : 'sign ') + msg + '\r');
      gbInput.value = '';
      term.focus();
      setTimeout(loadGbook, 800);
    } else {
      gbInput.classList.add('shake');
      setTimeout(() => gbInput.classList.remove('shake'), 350);
    }
    setTimeout(() => { gbToggle.checked = false; }, 650);
  });
  gbInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { gbToggle.checked = true; gbToggle.dispatchEvent(new Event('change')); }
  });

  // ---------- Terminal ----------
  const SESSION_MS = 10 * 60 * 1000;
  const isSmall = window.matchMedia('(max-width: 760px)').matches;
  const term = new Terminal({
    cursorBlink: true,
    fontSize: isSmall ? 13 : 14,
    fontFamily: '"SF Mono", "Fira Code", Menlo, Consolas, monospace',
    theme: {
      background: '#050807',
      foreground: '#45f376',
      cursor: '#00e5ff',
      selectionBackground: '#134d33',
    },
  });
  const fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  let ws = null;
  let timerInterval = null;

  function startTimer() {
    const end = Date.now() + SESSION_MS;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      const left = Math.max(0, end - Date.now());
      const m = Math.floor(left / 60000);
      const s = Math.floor((left % 60000) / 1000);
      timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}m`;
      if (left <= 0) clearInterval(timerInterval);
    }, 1000);
  }
  function stopTimer() { clearInterval(timerInterval); timerEl.textContent = '--:--'; }

  function sendResize() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', cols: term.cols, rows: term.rows }));
    }
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/terminal?lang=${lang}`);
    ws.onopen = () => {
      setStatus('connected');
      reconnectBtn.style.display = 'none';
      startTimer();
      sendResize();
      if (!isSmall) term.focus();
    };
    ws.onmessage = (e) => term.write(e.data);
    ws.onclose = () => {
      setStatus('disconnected');
      reconnectBtn.style.display = 'inline-block';
      stopTimer();
    };
    ws.onerror = () => {
      setStatus('error');
      reconnectBtn.style.display = 'inline-block';
      stopTimer();
    };
  }

  term.onData((data) => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(data);
  });
  reconnectBtn.addEventListener('click', () => {
    term.reset();
    setStatus('connecting');
    connect();
  });

  let resizeRaf = null;
  window.addEventListener('resize', () => {
    cancelAnimationFrame(resizeRaf);
    resizeRaf = requestAnimationFrame(() => { fitAddon.fit(); sendResize(); });
  });

  setLang(lang);
  setStatus('connecting');
  connect();
